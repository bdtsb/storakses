<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDT Store Key Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .dashboard-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            flex: 1;
            min-width: 250px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        .stat-card h3 {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .table-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th,
        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #f7f9fc;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        .header-actions h1 {
            font-size: 24px;
            color: var(--primary-color);
        }

        .header-actions a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .header-actions a:hover {
            color: var(--primary-color);
        }
    </style>
</head>

<body>

    <div class="admin-container">
        <div class="header-actions">
            <h1>Papan Pemuka Admin</h1>
            <a href="index.html">&larr; Kembali ke Aplikasi</a>
        </div>

        <div class="dashboard-stats">
            <div class="stat-card">
                <h3>Jumlah Akses Hari Ini</h3>
                <div class="stat-value" id="total-today">--</div>
            </div>
            <div class="stat-card">
                <h3>Pengguna Terakhir</h3>
                <div class="stat-value" id="last-person" style="font-size: 20px; line-height: 38px;">--</div>
            </div>
        </div>

        <div class="table-container">
            <h3 style="margin-bottom: 15px; color: var(--text-main);">Aktiviti Terkini</h3>
            <table>
                <thead>
                    <tr>
                        <th>Masa</th>
                        <th>Nama</th>
                        <th>Jabatan</th>
                        <th>Tujuan</th>
                        <th>Tempoh</th>
                    </tr>
                </thead>
                <tbody id="activity-table-body">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 20px;">Memuatkan data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
